<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Karaoke Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne+Mono&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>

<!-- Hidden inputs -->
<input type="file" id="videoFileInput" accept="video/*">
<input type="file" id="lyricsFileInput" accept=".txt,.lrc,.srt">

<div class="sync-flash" id="syncFlash"></div>

<header>
  <div class="logo">Karaoke<span>Studio</span></div>
  <div class="header-actions">
    <button class="btn" id="exportBtn">Export LRC</button>
    <button class="btn" id="exportSrtBtn">Export SRT</button>
    <button class="btn primary" id="saveBtn">Save Project</button>
  </div>
</header>

<div class="workspace">

  <!-- LEFT: Lyrics Panel -->
  <div class="lyrics-panel">
    <div class="panel-header">
      <span class="panel-title">Lyrics Lines</span>
      <span class="line-count" id="lineCount">0 lines</span>
    </div>

    <div class="lyrics-input-area" id="lyricsInputArea">
      <!-- Upload zone -->
      <div class="upload-zone" id="lyricsUploadZone">
        <div class="icon">📄</div>
        <p><strong>Upload lyrics file</strong><br>.txt · .lrc · .srt</p>
      </div>

      <!-- Raw text entry -->
      <textarea id="lyricsRaw" placeholder="Or paste lyrics here, one line per row…"></textarea>
      <div class="parse-btn-row">
        <button class="btn" id="parseLyricsBtn">Parse Lines →</button>
        <button class="btn" id="clearLyricsBtn">Clear</button>
      </div>

      <!-- Lines list -->
      <div class="lyrics-lines" id="lyricsList"></div>
    </div>
  </div>

  <!-- RIGHT: Video + Timeline -->
  <div class="video-section">

    <!-- Video area -->
    <div class="video-area" id="videoArea">
      <div class="video-drop-zone" id="videoDropZone">
        <div class="big-icon">🎬</div>
        <p><strong>Click or drag</strong> to load video</p>
        <p class="video-format-note">MP4 · MOV · WebM</p>
      </div>

      <div class="video-wrapper" id="videoWrapper">
        <video id="mainVideo" preload="metadata"></video>
        <div class="video-lyrics-overlay">
          <div class="overlay-text" id="overlayText"></div>
        </div>
      </div>
    </div>

    <!-- Instruction bar -->
    <div class="instruction-bar">
      <div class="instruction-text" id="instructionText">
        Load a video and lyrics to begin. Select a lyric line, then click the timeline to assign its timestamp.
      </div>
      <div class="active-line-pill" id="activePill"></div>
    </div>

    <!-- Timeline -->
    <div class="timeline-section">
      <div class="timeline-controls">
        <button class="play-btn" id="playBtn">▶</button>
        <div class="time-display" id="timeDisplay">0:00.0 / 0:00</div>
        <button class="speed-control" id="speedBtn" title="Playback speed">1×</button>
        <div class="timeline-spacer"></div>
        <div class="stats-row">
          <div class="stat">Synced: <span id="syncedCount">0</span></div>
          <div class="stat">Remaining: <span id="remainingCount">0</span></div>
        </div>
      </div>

      <div class="timeline-bar-wrap" id="timelineWrap">
        <canvas class="timeline-ticks" id="tickCanvas"></canvas>
        <div class="timeline-track">
          <div class="timeline-progress" id="timelineProgress"></div>
        </div>
        <!-- Markers added dynamically -->
        <div class="playhead" id="playhead"></div>
        <div class="timeline-hover-time" id="hoverTime"></div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
